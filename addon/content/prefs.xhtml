<vbox>
	<groupbox>
        <label><html:h2>API Key für ALMA</html:h2></label>
        <html:input type="text" preference="apikey"/>
	</groupbox>
    <groupbox>
        <checkbox preference="debug" data-l10n-id="preferences-debug"/>
    </groupbox>
    <groupbox>
        <label><html:h2 data-l10n-id="preferences-shortcuts"/></label>
        <description data-l10n-id="preferences-shortcutHint"/>
        <hbox class="shortcut-row" align="center">
            <label data-l10n-id="preferences-shortcutDDC" control="shortcutDDC-input"/>
            <html:input id="shortcutDDC-input" type="text" preference="shortcutDDC" class="shortcut-input"/>
        </hbox>
        <hbox class="shortcut-row" align="center">
            <label data-l10n-id="preferences-shortcutBC" control="shortcutBC-input"/>
            <html:input id="shortcutBC-input" type="text" preference="shortcutBC" class="shortcut-input"/>
        </hbox>
    </groupbox>
    <groupbox>
        <label><html:h2>Zielfeld</html:h2></label>
        <radiogroup preference="targetField" id="somePreference">
            <radio data-l10n-id="preferences-abstractNote" value="abstractNote"/>
            <radio data-l10n-id="preferences-extra" value="extra"/>
        </radiogroup>
    </groupbox>
</vbox>
<linkset>
	<html:link rel="localization" href="zoteroswisscoveryubbernlocations-ubbernlocations.ftl"/>
</linkset>
